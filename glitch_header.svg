<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="80" viewBox="0 0 3000 80">
  <style>
    @keyframes glitchClip1 {
      0%, 100% { clip-path: inset(0 0 85% 0); }
      10% { clip-path: inset(15% 0 65% 0); }
      20% { clip-path: inset(60% 0 5% 0); }
      30% { clip-path: inset(30% 0 40% 0); }
      40% { clip-path: inset(80% 0 0% 0); }
      50% { clip-path: inset(5% 0 75% 0); }
      60% { clip-path: inset(45% 0 35% 0); }
      70% { clip-path: inset(70% 0 10% 0); }
      80% { clip-path: inset(20% 0 55% 0); }
      90% { clip-path: inset(50% 0 25% 0); }
    }
    @keyframes glitchClip2 {
      0%, 100% { clip-path: inset(65% 0 0% 0); }
      10% { clip-path: inset(40% 0 30% 0); }
      20% { clip-path: inset(0% 0 80% 0); }
      30% { clip-path: inset(55% 0 15% 0); }
      40% { clip-path: inset(10% 0 70% 0); }
      50% { clip-path: inset(75% 0 5% 0); }
      60% { clip-path: inset(25% 0 50% 0); }
      70% { clip-path: inset(5% 0 60% 0); }
      80% { clip-path: inset(50% 0 20% 0); }
      90% { clip-path: inset(35% 0 40% 0); }
    }
    @keyframes glitchShift1 {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-12px, 0); }
      20% { transform: translate(8px, -2px); }
      30% { transform: translate(-5px, 1px); }
      40% { transform: translate(10px, 0); }
      50% { transform: translate(-8px, -1px); }
      60% { transform: translate(6px, 2px); }
      70% { transform: translate(-10px, 0); }
      80% { transform: translate(5px, -1px); }
      90% { transform: translate(-7px, 1px); }
    }
    @keyframes glitchShift2 {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(9px, 1px); }
      20% { transform: translate(-6px, 0); }
      30% { transform: translate(12px, -1px); }
      40% { transform: translate(-9px, 2px); }
      50% { transform: translate(5px, 0); }
      60% { transform: translate(-11px, -2px); }
      70% { transform: translate(7px, 1px); }
      80% { transform: translate(-5px, 0); }
      90% { transform: translate(9px, -1px); }
    }
    @keyframes flicker {
      0%, 94%, 96%, 98%, 100% { opacity: 1; }
      95% { opacity: 0.4; }
      97% { opacity: 0.7; }
      99% { opacity: 0.3; }
    }
    @keyframes lineSlide {
      0% { x: -500; }
      100% { x: 3000; }
    }
    @keyframes barFlash1 {
      0%, 100% { opacity: 0; }
      12% { opacity: 0.2; }
      13% { opacity: 0; }
      45% { opacity: 0.25; }
      46% { opacity: 0; }
      78% { opacity: 0.15; }
      79% { opacity: 0; }
    }
    @keyframes barFlash2 {
      0%, 100% { opacity: 0; }
      25% { opacity: 0.18; }
      26% { opacity: 0; }
      60% { opacity: 0.22; }
      61% { opacity: 0; }
      88% { opacity: 0.2; }
      89% { opacity: 0; }
    }
    .main-text {
      font-family: monospace;
      font-size: 48px;
      font-weight: 900;
      fill: #7ee687;
      animation: flicker 4s step-end infinite;
    }
    .glitch-r {
      font-family: monospace;
      font-size: 48px;
      font-weight: 900;
      fill: #0ff;
      opacity: 0.6;
      animation: glitchClip1 3s steps(1) infinite, glitchShift1 3s steps(1) infinite;
    }
    .glitch-b {
      font-family: monospace;
      font-size: 48px;
      font-weight: 900;
      fill: #f0f;
      opacity: 0.5;
      animation: glitchClip2 2.5s steps(1) infinite, glitchShift2 2.5s steps(1) infinite;
    }
  </style>
  <rect width="3000" height="80" fill="transparent"/>
  <!-- Hacky overflow lines that bleed out of the README container -->
  <line x1="0" y1="38" x2="3000" y2="38" stroke="#7ee687" stroke-width="1" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.3;0.1;0.25;0.15" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="42" x2="3000" y2="42" stroke="#0ff" stroke-width="1" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.2;0.05;0.15;0.1" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <!-- Glitch bars that span full width -->
  <rect x="0" y="20" width="3000" height="3" fill="#0ff" class="bar1" style="animation: barFlash1 4s step-end infinite;"/>
  <rect x="0" y="55" width="3000" height="2" fill="#f0f" class="bar2" style="animation: barFlash2 3.5s step-end infinite;"/>
  <!-- Sliding scan line -->
  <rect x="-500" y="0" width="200" height="80" fill="url(#scanGrad)" style="animation: lineSlide 4s linear infinite;">
  </rect>
  <defs>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ee687" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7ee687" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#7ee687" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Main text centered -->
  <text x="1500" y="54" text-anchor="middle" class="main-text">f3d1__</text>
  <text x="1500" y="54" text-anchor="middle" class="glitch-r">f3d1__</text>
  <text x="1500" y="54" text-anchor="middle" class="glitch-b">f3d1__</text>
</svg>