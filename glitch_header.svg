<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <style>
    @keyframes glitchClip1 {
      0%, 100% { clip-path: inset(0 0 85% 0); }
      10% { clip-path: inset(15% 0 65% 0); }
      20% { clip-path: inset(60% 0 5% 0); }
      30% { clip-path: inset(30% 0 40% 0); }
      40% { clip-path: inset(80% 0 0% 0); }
      50% { clip-path: inset(5% 0 75% 0); }
      60% { clip-path: inset(45% 0 35% 0); }
      70% { clip-path: inset(70% 0 10% 0); }
      80% { clip-path: inset(20% 0 55% 0); }
      90% { clip-path: inset(50% 0 25% 0); }
    }
    @keyframes glitchClip2 {
      0%, 100% { clip-path: inset(65% 0 0% 0); }
      10% { clip-path: inset(40% 0 30% 0); }
      20% { clip-path: inset(0% 0 80% 0); }
      30% { clip-path: inset(55% 0 15% 0); }
      40% { clip-path: inset(10% 0 70% 0); }
      50% { clip-path: inset(75% 0 5% 0); }
      60% { clip-path: inset(25% 0 50% 0); }
      70% { clip-path: inset(5% 0 60% 0); }
      80% { clip-path: inset(50% 0 20% 0); }
      90% { clip-path: inset(35% 0 40% 0); }
    }
    @keyframes glitchShift1 {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-10px, 0); }
      20% { transform: translate(7px, -2px); }
      30% { transform: translate(-4px, 1px); }
      40% { transform: translate(9px, 0); }
      50% { transform: translate(-7px, -1px); }
      60% { transform: translate(5px, 2px); }
      70% { transform: translate(-8px, 0); }
      80% { transform: translate(4px, -1px); }
      90% { transform: translate(-6px, 1px); }
    }
    @keyframes glitchShift2 {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(8px, 1px); }
      20% { transform: translate(-5px, 0); }
      30% { transform: translate(10px, -1px); }
      40% { transform: translate(-8px, 2px); }
      50% { transform: translate(4px, 0); }
      60% { transform: translate(-9px, -2px); }
      70% { transform: translate(6px, 1px); }
      80% { transform: translate(-4px, 0); }
      90% { transform: translate(8px, -1px); }
    }
    @keyframes flicker {
      0%, 94%, 96%, 98%, 100% { opacity: 1; }
      95% { opacity: 0.4; }
      97% { opacity: 0.7; }
      99% { opacity: 0.3; }
    }
    @keyframes barFlash1 {
      0%, 100% { opacity: 0; }
      12% { opacity: 0.2; }
      13% { opacity: 0; }
      45% { opacity: 0.25; }
      46% { opacity: 0; }
      78% { opacity: 0.15; }
      79% { opacity: 0; }
    }
    @keyframes barFlash2 {
      0%, 100% { opacity: 0; }
      25% { opacity: 0.18; }
      26% { opacity: 0; }
      60% { opacity: 0.22; }
      61% { opacity: 0; }
      88% { opacity: 0.2; }
      89% { opacity: 0; }
    }
    .main-text {
      font-family: monospace;
      font-size: 64px;
      font-weight: 900;
      fill: #7ee687;
      animation: flicker 4s step-end infinite;
    }
    .glitch-r {
      font-family: monospace;
      font-size: 64px;
      font-weight: 900;
      fill: #0ff;
      opacity: 0.6;
      animation: glitchClip1 3s steps(1) infinite, glitchShift1 3s steps(1) infinite;
    }
    .glitch-b {
      font-family: monospace;
      font-size: 64px;
      font-weight: 900;
      fill: #f0f;
      opacity: 0.5;
      animation: glitchClip2 2.5s steps(1) infinite, glitchShift2 2.5s steps(1) infinite;
    }
    .bar1 { animation: barFlash1 4s step-end infinite; }
    .bar2 { animation: barFlash2 3.5s step-end infinite; }
  </style>
  <rect width="800" height="120" fill="transparent"/>
  <line x1="0" y1="58" x2="800" y2="58" stroke="#7ee687" stroke-width="1" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.3;0.1;0.25;0.15" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="62" x2="800" y2="62" stroke="#0ff" stroke-width="1" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.2;0.05;0.15;0.1" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <rect x="0" y="30" width="800" height="3" fill="#0ff" opacity="0" class="bar1"/>
  <rect x="0" y="80" width="800" height="2" fill="#f0f" opacity="0" class="bar2"/>
  <text x="400" y="78" text-anchor="middle" class="main-text">f3d1__</text>
  <text x="400" y="78" text-anchor="middle" class="glitch-r">f3d1__</text>
  <text x="400" y="78" text-anchor="middle" class="glitch-b">f3d1__</text>
</svg>